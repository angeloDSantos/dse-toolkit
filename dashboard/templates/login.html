<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE Toolkit — Authenticate</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0e17;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridPulse 8s ease-in-out infinite;
        }

        @keyframes gridPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: orbFloat 12s ease-in-out infinite;
        }
        .orb-1 { width: 300px; height: 300px; background: rgba(99, 102, 241, 0.08); top: 10%; left: 15%; animation-delay: 0s; }
        .orb-2 { width: 250px; height: 250px; background: rgba(139, 92, 246, 0.06); bottom: 15%; right: 20%; animation-delay: -4s; }
        .orb-3 { width: 200px; height: 200px; background: rgba(59, 130, 246, 0.05); top: 50%; left: 60%; animation-delay: -8s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(20px, -30px); }
            66% { transform: translate(-15px, 20px); }
        }

        /* Login card */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
        }

        .login-card {
            background: rgba(15, 20, 35, 0.85);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 20px;
            padding: 48px 40px 40px;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(99, 102, 241, 0.05),
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(99, 102, 241, 0.03);
            animation: cardEntry 0.6s ease-out;
        }

        @keyframes cardEntry {
            from { opacity: 0; transform: scale(0.96) translateY(20px); }
            to { opacity: 1; transform: none; }
        }

        /* Logo area */
        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-icon {
            font-size: 36px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.3));
        }
        .logo-title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .logo-subtitle {
            font-size: 12px;
            color: rgba(148, 163, 184, 0.7);
            margin-top: 6px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(148, 163, 184, 0.8);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 15px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            outline: none;
        }
        .form-input:focus {
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08), 0 0 20px rgba(99, 102, 241, 0.05);
        }
        .form-input::placeholder {
            color: rgba(100, 116, 139, 0.5);
            letter-spacing: 1px;
            font-size: 13px;
        }

        /* Button */
        .btn-auth {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn-auth:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.3);
        }
        .btn-auth:active {
            transform: translateY(0);
        }
        .btn-auth::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.08) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }
        .btn-auth:hover::after {
            transform: translateX(100%);
        }

        /* Error */
        .error-msg {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 20px;
            color: #f87171;
            font-size: 13px;
            text-align: center;
            animation: errorShake 0.4s ease-out;
        }
        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(3px); }
        }

        /* SSH key footer */
        .ssh-footer {
            position: fixed;
            bottom: 20px;
            right: 24px;
            z-index: 5;
            text-align: right;
            animation: fadeIn 1.2s ease-out 0.4s both;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: none; }
        }
        .ssh-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(99, 102, 241, 0.4);
            margin-bottom: 4px;
        }
        .ssh-key {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: rgba(100, 116, 139, 0.35);
            max-width: 420px;
            word-break: break-all;
            line-height: 1.5;
        }

        /* Status dot */
        .status-bar {
            position: fixed;
            top: 24px;
            left: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 5;
            animation: fadeIn 1s ease-out 0.6s both;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: statusPulse 2s ease-in-out infinite;
        }
        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
        }
        .status-text {
            font-size: 10px;
            color: rgba(148, 163, 184, 0.4);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Version */
        .version {
            position: fixed;
            bottom: 20px;
            left: 24px;
            font-size: 10px;
            color: rgba(100, 116, 139, 0.25);
            z-index: 5;
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="status-bar">
        <div class="status-dot"></div>
        <span class="status-text">Secure Connection</span>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <div class="logo-icon">⚡</div>
                <div class="logo-title">DSE Toolkit</div>
                <div class="logo-subtitle">Authentication Required</div>
            </div>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login">
                <div class="form-group">
                    <label class="form-label">Access Key</label>
                    <input type="password" name="password" class="form-input"
                           placeholder="Enter access key" autofocus required>
                </div>
                <button type="submit" class="btn-auth">Authenticate</button>
            </form>
        </div>
    </div>

    <div class="ssh-footer">
        <div class="ssh-label">SSH Encryption</div>
        <div class="ssh-key" id="ssh-key"></div>
    </div>

    <div class="version">v2.0 — Local Mode</div>

    <script>
    // Generate a random SSH public key
    (function() {
        const formats = ['ssh-rsa', 'ssh-ed25519', 'ecdsa-sha2-nistp256'];
        const chosen = formats[Math.floor(Math.random() * formats.length)];

        function randBase64(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            // Pad to multiple of 4
            while (result.length % 4 !== 0) result += '=';
            return result;
        }

        let keyBody;
        if (chosen === 'ssh-rsa') {
            keyBody = randBase64(372);
        } else if (chosen === 'ssh-ed25519') {
            keyBody = randBase64(68);
        } else {
            keyBody = randBase64(139);
        }

        const key = `${chosen} ${keyBody} dse-toolkit@gds`;
        document.getElementById('ssh-key').textContent = key;
    })();
    </script>
</body>
</html>
