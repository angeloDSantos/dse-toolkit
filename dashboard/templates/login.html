<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperium — Authenticate</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #06080f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(99, 102, 241, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridPulse 8s ease-in-out infinite;
        }
        @keyframes gridPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* Glow orbs */
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; animation: orbFloat 12s ease-in-out infinite; }
        .orb-1 { width: 350px; height: 350px; background: rgba(99, 102, 241, 0.06); top: 5%; left: 10%; }
        .orb-2 { width: 280px; height: 280px; background: rgba(139, 92, 246, 0.05); bottom: 10%; right: 15%; animation-delay: -4s; }
        .orb-3 { width: 220px; height: 220px; background: rgba(168, 85, 247, 0.04); top: 45%; left: 55%; animation-delay: -8s; }
        @keyframes orbFloat { 0%, 100% { transform: translate(0,0); } 33% { transform: translate(20px,-30px); } 66% { transform: translate(-15px,20px); } }

        /* Login card */
        .login-container { position: relative; z-index: 10; width: 100%; max-width: 420px; padding: 0 20px; }
        .login-card {
            background: rgba(14, 18, 32, 0.85);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 24px;
            padding: 52px 44px 44px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 0 1px rgba(99,102,241,0.03), 0 24px 64px rgba(0,0,0,0.5), 0 0 120px rgba(99,102,241,0.03);
            animation: cardEntry 0.6s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes cardEntry { from { opacity: 0; transform: scale(0.96) translateY(20px); } to { opacity: 1; transform: none; } }

        /* Branding */
        .logo-area { text-align: center; margin-bottom: 40px; }
        .brand-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(99,102,241,0.3);
        }
        .brand-name {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-subtitle {
            font-size: 11px;
            color: rgba(148, 163, 184, 0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .form-group { margin-bottom: 22px; }
        .form-label {
            display: block; font-size: 10px; font-weight: 700;
            color: rgba(148,163,184,0.6); text-transform: uppercase;
            letter-spacing: 1.5px; margin-bottom: 10px;
        }
        .form-input {
            width: 100%; padding: 14px 18px;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid rgba(99,102,241,0.1);
            border-radius: 14px; color: #e2e8f0;
            font-size: 15px; font-family: 'JetBrains Mono', monospace;
            letter-spacing: 2px; outline: none;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            border-color: rgba(99,102,241,0.4);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.08), 0 0 30px rgba(99,102,241,0.04);
        }
        .form-input::placeholder { color: rgba(100,116,139,0.4); letter-spacing: 1px; font-size: 13px; }

        .btn-auth {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none; border-radius: 14px; color: #fff;
            font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: all 0.25s ease;
            position: relative; overflow: hidden;
            box-shadow: 0 4px 16px rgba(99,102,241,0.25);
        }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.35); }
        .btn-auth:active { transform: translateY(0); }

        .error-msg {
            background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.15);
            border-radius: 12px; padding: 12px 16px; margin-bottom: 20px;
            color: #f87171; font-size: 13px; text-align: center; font-weight: 500;
            animation: errorShake 0.4s ease-out;
        }
        @keyframes errorShake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(3px); } }

        /* SSH footer */
        .ssh-footer { position: fixed; bottom: 20px; right: 24px; z-index: 5; text-align: right; animation: fadeIn 1.2s ease-out 0.4s both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        .ssh-label { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(99,102,241,0.3); margin-bottom: 4px; }
        .ssh-key { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; color: rgba(100,116,139,0.25); max-width: 420px; word-break: break-all; line-height: 1.5; }

        .status-bar { position: fixed; top: 24px; left: 24px; display: flex; align-items: center; gap: 8px; z-index: 5; animation: fadeIn 1s ease-out 0.6s both; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); } 50% { box-shadow: 0 0 0 4px rgba(16,185,129,0); } }
        .status-text { font-size: 10px; color: rgba(148,163,184,0.3); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

        .version { position: fixed; bottom: 20px; left: 24px; font-size: 10px; color: rgba(100,116,139,0.2); z-index: 5; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
    <div class="status-bar"><div class="status-dot"></div><span class="status-text">Secure Connection</span></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <div class="brand-icon">I</div>
                <div class="brand-name">Imperium</div>
                <div class="brand-subtitle">Authentication Required</div>
            </div>
            {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
            <form method="post" action="/login">
                <div class="form-group">
                    <label class="form-label">Access Key</label>
                    <input type="password" name="password" class="form-input" placeholder="Enter access key" autofocus required>
                </div>
                <button type="submit" class="btn-auth">Authenticate</button>
            </form>
        </div>
    </div>

    <div class="ssh-footer">
        <div class="ssh-label">SSH Encryption</div>
        <div class="ssh-key" id="ssh-key"></div>
    </div>
    <div class="version">v2.0 — Local Mode</div>

    <script>
    (function() {
        const formats = ['ssh-rsa', 'ssh-ed25519', 'ecdsa-sha2-nistp256'];
        const chosen = formats[Math.floor(Math.random() * formats.length)];
        function rb64(n) {
            const c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
            let r = '';
            for (let i = 0; i < n; i++) r += c.charAt(Math.floor(Math.random() * c.length));
            while (r.length % 4 !== 0) r += '=';
            return r;
        }
        const len = chosen === 'ssh-rsa' ? 372 : chosen === 'ssh-ed25519' ? 68 : 139;
        document.getElementById('ssh-key').textContent = `${chosen} ${rb64(len)} imperium@gds`;
    })();
    </script>
</body>
</html>
